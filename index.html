<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Survivors</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; touch-action: none; }
canvas { display: block; }
#ui { position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; font-family: 'Segoe UI', sans-serif; color: #fff; }
#hud { display: flex; justify-content: space-between; padding: 10px 20px; font-size: 14px; }
#hp-bar { width: 200px; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
#hp-fill { height: 100%; background: linear-gradient(90deg, #f44, #ff4); transition: width 0.2s; }
#xp-bar { width: 100%; height: 6px; background: #222; }
#xp-fill { height: 100%; background: linear-gradient(90deg, #4af, #a4f); transition: width 0.3s; }
#level-up { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); pointer-events: all; z-index: 10; }
#level-up-inner { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
#level-up h2 { font-size: 32px; color: #ff0; margin-bottom: 20px; text-shadow: 0 0 20px #ff0; }
.choice { display: inline-block; width: 180px; margin: 10px; padding: 20px; background: rgba(255,255,255,0.1); border: 2px solid #4af; border-radius: 12px; cursor: pointer; transition: all 0.2s; vertical-align: top; }
.choice:hover { background: rgba(100,170,255,0.3); transform: scale(1.05); border-color: #ff0; }
.choice h3 { font-size: 18px; color: #4af; margin-bottom: 8px; }
.choice p { font-size: 12px; color: #aaa; }
#game-over, #start-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); pointer-events: all; z-index: 20; }
#start-screen { display: flex; }
#game-over-inner, #start-inner { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
#start-inner h1 { font-size: 48px; color: #f0f; text-shadow: 0 0 30px #f0f, 0 0 60px #a0a; margin-bottom: 10px; }
#start-inner p { color: #888; margin-bottom: 30px; }
.btn { padding: 15px 40px; font-size: 20px; background: linear-gradient(135deg, #a0f, #40f); border: none; color: #fff; border-radius: 8px; cursor: pointer; font-family: inherit; pointer-events: all; }
.btn:hover { filter: brightness(1.3); }
#game-over-inner h2 { font-size: 36px; color: #f44; margin-bottom: 20px; }
#game-over-inner .stat { font-size: 18px; margin: 8px 0; color: #ccc; }
#timer { font-size: 20px; color: #ff0; text-shadow: 0 0 10px #ff0; }
#joystick { display: none; position: fixed; bottom: 60px; left: 60px; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); z-index: 5; pointer-events: all; }
#joystick-knob { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; margin: -20px; border-radius: 50%; background: rgba(255,255,255,0.4); }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <div id="xp-bar"><div id="xp-fill" style="width:0%"></div></div>
  <div id="hud">
    <div><div id="hp-bar"><div id="hp-fill" style="width:100%"></div></div><span id="hp-text">100/100</span></div>
    <div id="timer">00:00</div>
    <div><span id="level-text">Lv.1</span> | <span id="kill-text">0 kills</span></div>
  </div>
</div>
<div id="level-up"><div id="level-up-inner"><h2>LEVEL UP!</h2><div id="choices"></div></div></div>
<div id="game-over"><div id="game-over-inner"><h2>GAME OVER</h2><div id="go-stats"></div><button class="btn" onclick="startGame()">再來一次</button></div></div>
<div id="start-screen"><div id="start-inner"><h1>NEON SURVIVORS</h1><p>WASD / 方向鍵移動 · 武器自動攻擊 · 存活越久越強</p><button class="btn" onclick="startGame()">開始遊戲</button></div></div>
<div id="joystick"><div id="joystick-knob"></div></div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, dur, type='square', vol=0.1) {
  const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function sfxHit() { playSound(200 + Math.random()*100, 0.1, 'square', 0.05); }
function sfxKill() { playSound(600, 0.15, 'sine', 0.08); playSound(900, 0.1, 'sine', 0.06); }
function sfxLevelUp() { playSound(523, 0.2, 'sine', 0.1); setTimeout(()=>playSound(659, 0.2, 'sine', 0.1), 100); setTimeout(()=>playSound(784, 0.3, 'sine', 0.1), 200); }
function sfxBoss() { playSound(80, 0.5, 'sawtooth', 0.15); }

// State
let player, enemies, projectiles, particles, gems, weapons, gameTime, kills, paused, gameOver, shakeTimer, camera;

const WEAPONS = {
  knife: { name: '旋轉飛刀', desc: '圍繞玩家旋轉的飛刀', color: '#4af', dmg: 15, cd: 0, count: 3, speed: 3, range: 100 },
  bullet: { name: '直射彈幕', desc: '向最近敵人發射子彈', color: '#f84', dmg: 20, cd: 800, count: 1, speed: 8, range: 300 },
  shield: { name: '環繞護盾', desc: '環繞玩家的護盾', color: '#af4', dmg: 10, cd: 0, count: 2, speed: 2, range: 60 },
  lightning: { name: '閃電鏈', desc: '隨機打擊附近敵人', color: '#ff4', dmg: 30, cd: 2000, count: 1, speed: 0, range: 200 },
  wave: { name: '衝擊波', desc: '全方位衝擊波', color: '#f4f', dmg: 25, cd: 3000, count: 1, speed: 0, range: 150 },
};

function initGame() {
  player = { x: 0, y: 0, hp: 100, maxHp: 100, speed: 3, xp: 0, level: 1, xpNeeded: 10, invincible: 0 };
  enemies = []; projectiles = []; particles = []; gems = [];
  weapons = [{ type: 'knife', level: 1, timer: 0, angle: 0 }];
  gameTime = 0; kills = 0; paused = false; gameOver = false; shakeTimer = 0;
  camera = { x: 0, y: 0 };
}

// Input
const keys = {};
let joyX = 0, joyY = 0;
window.addEventListener('keydown', e => { keys[e.key] = true; if(audioCtx.state==='suspended') audioCtx.resume(); });
window.addEventListener('keyup', e => keys[e.key] = false);

// Touch joystick
const isMobile = 'ontouchstart' in window;
if (isMobile) {
  document.getElementById('joystick').style.display = 'block';
  const joy = document.getElementById('joystick');
  const knob = document.getElementById('joystick-knob');
  let joyActive = false, joyStartX, joyStartY;
  joy.addEventListener('touchstart', e => { e.preventDefault(); joyActive = true; const t = e.touches[0]; joyStartX = t.clientX; joyStartY = t.clientY; if(audioCtx.state==='suspended') audioCtx.resume(); });
  window.addEventListener('touchmove', e => { if (!joyActive) return; const t = e.touches[0]; let dx = t.clientX - joyStartX, dy = t.clientY - joyStartY; const dist = Math.sqrt(dx*dx+dy*dy); if (dist > 50) { dx = dx/dist*50; dy = dy/dist*50; } knob.style.transform = `translate(${dx}px, ${dy}px)`; joyX = dx/50; joyY = dy/50; });
  window.addEventListener('touchend', () => { joyActive = false; joyX = joyY = 0; knob.style.transform = ''; });
}

function getInput() {
  let dx = 0, dy = 0;
  if (keys['w'] || keys['ArrowUp']) dy = -1;
  if (keys['s'] || keys['ArrowDown']) dy = 1;
  if (keys['a'] || keys['ArrowLeft']) dx = -1;
  if (keys['d'] || keys['ArrowRight']) dx = 1;
  if (joyX || joyY) { dx = joyX; dy = joyY; }
  const len = Math.sqrt(dx*dx+dy*dy);
  if (len > 0) { dx /= len; dy /= len; }
  return { dx, dy };
}

// Spawn enemies
function spawnEnemy() {
  const angle = Math.random() * Math.PI * 2;
  const dist = Math.max(W, H) * 0.6 + Math.random() * 100;
  const mins = gameTime / 60000;
  const isBoss = mins > 0 && mins % 5 < 0.05 && enemies.filter(e=>e.boss).length === 0;
  const hpMult = 1 + mins * 0.5;
  const dmgMult = 1 + mins * 0.2;

  if (isBoss) {
    sfxBoss();
    enemies.push({
      x: player.x + Math.cos(angle) * dist,
      y: player.y + Math.sin(angle) * dist,
      hp: 500 * hpMult, maxHp: 500 * hpMult,
      speed: 1, dmg: 20 * dmgMult, size: 30,
      color: '#f44', boss: true, xp: 50
    });
  } else {
    const types = [
      { hp: 20, speed: 1.5, dmg: 5, size: 10, color: '#8f8', xp: 1 },
      { hp: 40, speed: 1, dmg: 10, size: 14, color: '#f80', xp: 2 },
      { hp: 60, speed: 0.8, dmg: 15, size: 18, color: '#f4f', xp: 3 },
    ];
    const t = types[Math.min(Math.floor(Math.random() * (1 + mins/3)), types.length-1)];
    enemies.push({
      x: player.x + Math.cos(angle) * dist,
      y: player.y + Math.sin(angle) * dist,
      hp: t.hp * hpMult, maxHp: t.hp * hpMult,
      speed: t.speed + mins * 0.02, dmg: t.dmg * dmgMult,
      size: t.size, color: t.color, boss: false, xp: t.xp
    });
  }
}

// Weapon logic
function updateWeapons(dt) {
  weapons.forEach(w => {
    const def = WEAPONS[w.type];
    w.timer += dt;
    const dmg = def.dmg * (1 + (w.level-1) * 0.3);
    const count = def.count + Math.floor((w.level-1) / 2);
    const range = def.range * (1 + (w.level-1) * 0.15);

    if (w.type === 'knife') {
      w.angle = (w.angle || 0) + def.speed * dt / 1000;
      for (let i = 0; i < count; i++) {
        const a = w.angle + (Math.PI * 2 / count) * i;
        const kx = player.x + Math.cos(a) * range;
        const ky = player.y + Math.sin(a) * range;
        enemies.forEach(e => {
          const d = Math.hypot(e.x - kx, e.y - ky);
          if (d < e.size + 8) { damageEnemy(e, dmg * dt / 1000 * 3); }
        });
      }
      w._positions = Array.from({length:count}, (_,i) => {
        const a = w.angle + (Math.PI*2/count)*i;
        return { x: player.x + Math.cos(a)*range, y: player.y + Math.sin(a)*range };
      });
    }

    if (w.type === 'shield') {
      w.angle = (w.angle || 0) + def.speed * dt / 1000;
      for (let i = 0; i < count; i++) {
        const a = w.angle + (Math.PI * 2 / count) * i;
        const sx = player.x + Math.cos(a) * range;
        const sy = player.y + Math.sin(a) * range;
        enemies.forEach(e => {
          const d = Math.hypot(e.x - sx, e.y - sy);
          if (d < e.size + 12) { damageEnemy(e, dmg * dt / 1000 * 2); }
        });
      }
      w._positions = Array.from({length:count}, (_,i) => {
        const a = w.angle + (Math.PI*2/count)*i;
        return { x: player.x + Math.cos(a)*range, y: player.y + Math.sin(a)*range };
      });
    }

    if (w.type === 'bullet' && w.timer >= def.cd / (1 + (w.level-1)*0.2)) {
      w.timer = 0;
      let nearest = null, nd = Infinity;
      enemies.forEach(e => { const d = Math.hypot(e.x-player.x, e.y-player.y); if(d<nd){nd=d;nearest=e;} });
      if (nearest && nd < range * 2) {
        const a = Math.atan2(nearest.y-player.y, nearest.x-player.x);
        for (let i = 0; i < count; i++) {
          const spread = (i - (count-1)/2) * 0.15;
          projectiles.push({ x: player.x, y: player.y, vx: Math.cos(a+spread)*def.speed, vy: Math.sin(a+spread)*def.speed, dmg, life: 1000, color: def.color, size: 4 });
        }
        playSound(400, 0.05, 'square', 0.03);
      }
    }

    if (w.type === 'lightning' && w.timer >= def.cd / (1 + (w.level-1)*0.2)) {
      w.timer = 0;
      const targets = enemies.filter(e => Math.hypot(e.x-player.x, e.y-player.y) < range).slice(0, count + w.level);
      targets.forEach(e => {
        damageEnemy(e, dmg);
        for (let i = 0; i < 5; i++) particles.push({ x: e.x, y: e.y, vx: (Math.random()-0.5)*3, vy: (Math.random()-0.5)*3, life: 300, color: '#ff4', size: 3 });
        playSound(800 + Math.random()*400, 0.08, 'sawtooth', 0.04);
      });
    }

    if (w.type === 'wave' && w.timer >= def.cd / (1 + (w.level-1)*0.2)) {
      w.timer = 0;
      enemies.forEach(e => {
        const d = Math.hypot(e.x-player.x, e.y-player.y);
        if (d < range) { damageEnemy(e, dmg * (1 - d/range)); }
      });
      w._wave = { r: 0, maxR: range, life: 300 };
      playSound(150, 0.3, 'sine', 0.1);
    }
    if (w._wave) { w._wave.r += range/300 * dt; w._wave.life -= dt; if(w._wave.life<=0) w._wave=null; }
  });
}

function damageEnemy(e, dmg) {
  e.hp -= dmg;
  sfxHit();
  particles.push({ x: e.x, y: e.y-e.size, vx: (Math.random()-0.5)*2, vy: -2, life: 600, text: Math.ceil(dmg).toString(), color: '#ff0', size: 12 });
  if (e.hp <= 0 && !e.dead) {
    e.dead = true; kills++;
    sfxKill();
    for (let i = 0; i < (e.boss ? 20 : 8); i++) {
      particles.push({ x: e.x, y: e.y, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6, life: 500+Math.random()*300, color: e.color, size: 2+Math.random()*3 });
    }
    gems.push({ x: e.x, y: e.y, xp: e.xp, size: e.boss ? 10 : 5, color: '#4af', life: 10000 });
    shakeTimer = e.boss ? 300 : 100;
  }
}

function levelUp() {
  paused = true;
  sfxLevelUp();
  document.getElementById('level-up').style.display = 'block';
  const choicesDiv = document.getElementById('choices');
  choicesDiv.innerHTML = '';

  const options = [];
  // Existing weapon upgrades
  weapons.forEach(w => {
    if (w.level < 8) options.push({ type: 'upgrade', weapon: w.type, name: WEAPONS[w.type].name + ' ↑', desc: `Lv.${w.level} → Lv.${w.level+1}` });
  });
  // New weapons
  Object.keys(WEAPONS).forEach(k => {
    if (!weapons.find(w=>w.type===k)) options.push({ type: 'new', weapon: k, name: WEAPONS[k].name, desc: WEAPONS[k].desc });
  });
  // Stat boosts
  options.push({ type: 'stat', stat: 'maxHp', name: 'HP +20', desc: '增加最大生命值' });
  options.push({ type: 'stat', stat: 'speed', name: '速度 +0.3', desc: '增加移動速度' });

  const picks = [];
  while (picks.length < 3 && options.length > 0) {
    const i = Math.floor(Math.random() * options.length);
    picks.push(options.splice(i, 1)[0]);
  }

  picks.forEach(opt => {
    const div = document.createElement('div');
    div.className = 'choice';
    div.innerHTML = `<h3>${opt.name}</h3><p>${opt.desc}</p>`;
    div.onclick = () => {
      if (opt.type === 'upgrade') {
        weapons.find(w=>w.type===opt.weapon).level++;
      } else if (opt.type === 'new') {
        weapons.push({ type: opt.weapon, level: 1, timer: 0, angle: 0 });
      } else if (opt.type === 'stat') {
        if (opt.stat === 'maxHp') { player.maxHp += 20; player.hp = Math.min(player.hp + 20, player.maxHp); }
        if (opt.stat === 'speed') player.speed += 0.3;
      }
      document.getElementById('level-up').style.display = 'none';
      paused = false;
    };
    choicesDiv.appendChild(div);
  });
}

// Draw
function drawGrid() {
  const gs = 60;
  const ox = -camera.x % gs, oy = -camera.y % gs;
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  for (let x = ox; x < W; x += gs) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = oy; y < H; y += gs) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
}

function toScreen(wx, wy) { return { x: wx - camera.x, y: wy - camera.y }; }

function drawGlow(x, y, r, color, alpha=0.3) {
  const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
  grad.addColorStop(0, color.replace(')', `,${alpha})`).replace('rgb', 'rgba'));
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
}

function render() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  // Shake
  let sx = 0, sy = 0;
  if (shakeTimer > 0) { sx = (Math.random()-0.5)*shakeTimer/20; sy = (Math.random()-0.5)*shakeTimer/20; }
  ctx.save();
  ctx.translate(sx, sy);

  drawGrid();

  // Gems
  gems.forEach(g => {
    const s = toScreen(g.x, g.y);
    ctx.fillStyle = g.color;
    ctx.globalAlpha = 0.8;
    ctx.beginPath(); ctx.arc(s.x, s.y, g.size, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  });

  // Enemies
  enemies.forEach(e => {
    if (e.dead) return;
    const s = toScreen(e.x, e.y);
    if (s.x < -50 || s.x > W+50 || s.y < -50 || s.y > H+50) return;

    ctx.fillStyle = e.color;
    ctx.beginPath();
    if (e.boss) {
      // Boss: hexagon
      for (let i = 0; i < 6; i++) {
        const a = Math.PI/3*i - Math.PI/6;
        const px = s.x + Math.cos(a)*e.size, py = s.y + Math.sin(a)*e.size;
        i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
      }
      ctx.closePath();
    } else {
      ctx.arc(s.x, s.y, e.size, 0, Math.PI*2);
    }
    ctx.fill();

    // HP bar for boss
    if (e.boss) {
      ctx.fillStyle = '#333'; ctx.fillRect(s.x-30, s.y-e.size-12, 60, 5);
      ctx.fillStyle = '#f44'; ctx.fillRect(s.x-30, s.y-e.size-12, 60*(e.hp/e.maxHp), 5);
    }
  });

  // Weapons visuals
  weapons.forEach(w => {
    const def = WEAPONS[w.type];
    if (w.type === 'knife' && w._positions) {
      w._positions.forEach(p => {
        const s = toScreen(p.x, p.y);
        ctx.fillStyle = def.color;
        ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(w.angle*3);
        ctx.beginPath(); ctx.moveTo(0,-8); ctx.lineTo(4,8); ctx.lineTo(-4,8); ctx.closePath();
        ctx.fill(); ctx.restore();
      });
    }
    if (w.type === 'shield' && w._positions) {
      w._positions.forEach(p => {
        const s = toScreen(p.x, p.y);
        ctx.strokeStyle = def.color; ctx.lineWidth = 3; ctx.globalAlpha = 0.6;
        ctx.beginPath(); ctx.arc(s.x, s.y, 12, 0, Math.PI*2); ctx.stroke();
        ctx.globalAlpha = 1;
      });
    }
    if (w._wave) {
      const s = toScreen(player.x, player.y);
      ctx.strokeStyle = def.color; ctx.lineWidth = 2; ctx.globalAlpha = w._wave.life / 300;
      ctx.beginPath(); ctx.arc(s.x, s.y, w._wave.r, 0, Math.PI*2); ctx.stroke();
      ctx.globalAlpha = 1;
    }
  });

  // Projectiles
  projectiles.forEach(p => {
    const s = toScreen(p.x, p.y);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(s.x, s.y, p.size, 0, Math.PI*2); ctx.fill();
  });

  // Player
  const ps = toScreen(player.x, player.y);
  if (player.invincible > 0 && Math.floor(player.invincible/50)%2) {} else {
    drawGlow(ps.x, ps.y, 30, '#4af', 0.15);
    ctx.fillStyle = '#4af';
    ctx.beginPath(); ctx.arc(ps.x, ps.y, 12, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(ps.x, ps.y, 6, 0, Math.PI*2); ctx.fill();
  }

  // Particles
  particles.forEach(p => {
    const s = toScreen(p.x, p.y);
    ctx.globalAlpha = Math.max(0, p.life / 600);
    if (p.text) {
      ctx.fillStyle = p.color; ctx.font = `bold ${p.size}px sans-serif`;
      ctx.fillText(p.text, s.x, s.y);
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(s.x, s.y, p.size, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  });

  ctx.restore();
}

// Update
let lastTime = 0, spawnTimer = 0;
function update(ts) {
  if (!lastTime) lastTime = ts;
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;

  if (gameOver) { requestAnimationFrame(update); return; }
  if (paused) { requestAnimationFrame(update); return; }

  gameTime += dt;
  shakeTimer = Math.max(0, shakeTimer - dt);

  // Input
  const input = getInput();
  player.x += input.dx * player.speed;
  player.y += input.dy * player.speed;
  player.invincible = Math.max(0, player.invincible - dt);

  // Camera
  camera.x = player.x - W/2;
  camera.y = player.y - H/2;

  // Spawn
  const mins = gameTime / 60000;
  const spawnRate = Math.max(200, 1000 - mins * 100);
  spawnTimer += dt;
  if (spawnTimer > spawnRate) { spawnTimer = 0; spawnEnemy(); }

  // Enemies
  enemies.forEach(e => {
    if (e.dead) return;
    const dx = player.x - e.x, dy = player.y - e.y;
    const d = Math.hypot(dx, dy);
    if (d > 0) { e.x += dx/d * e.speed; e.y += dy/d * e.speed; }
    if (d < e.size + 12 && player.invincible <= 0) {
      player.hp -= e.dmg;
      player.invincible = 500;
      shakeTimer = 100;
      playSound(100, 0.2, 'sawtooth', 0.1);
      for (let i = 0; i < 5; i++) particles.push({ x: player.x, y: player.y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, life: 300, color: '#f44', size: 3 });
    }
  });
  enemies = enemies.filter(e => !e.dead);

  // Projectiles
  projectiles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.life -= dt;
    enemies.forEach(e => {
      if (e.dead) return;
      if (Math.hypot(e.x-p.x, e.y-p.y) < e.size + p.size) {
        damageEnemy(e, p.dmg); p.life = 0;
      }
    });
  });
  projectiles = projectiles.filter(p => p.life > 0);

  // Gems
  gems.forEach(g => {
    g.life -= dt;
    const d = Math.hypot(player.x-g.x, player.y-g.y);
    if (d < 80) { // magnetic
      const dx = player.x-g.x, dy = player.y-g.y;
      g.x += dx/d * 5; g.y += dy/d * 5;
    }
    if (d < 20) {
      player.xp += g.xp; g.life = 0;
      playSound(1000, 0.05, 'sine', 0.03);
    }
  });
  gems = gems.filter(g => g.life > 0);

  // Level up
  if (player.xp >= player.xpNeeded) {
    player.xp -= player.xpNeeded;
    player.level++;
    player.xpNeeded = Math.floor(player.xpNeeded * 1.5);
    levelUp();
  }

  // Weapons
  updateWeapons(dt);

  // Particles
  particles.forEach(p => { p.x += (p.vx||0); p.y += (p.vy||0); p.life -= dt; if(p.vy) p.vy += 0.05; });
  particles = particles.filter(p => p.life > 0);

  // Death
  if (player.hp <= 0) {
    gameOver = true;
    const secs = Math.floor(gameTime/1000);
    const m = Math.floor(secs/60), s = secs%60;
    document.getElementById('go-stats').innerHTML = `
      <div class="stat">存活時間: ${m}:${s.toString().padStart(2,'0')}</div>
      <div class="stat">擊殺數: ${kills}</div>
      <div class="stat">等級: ${player.level}</div>
      <div class="stat">武器: ${weapons.map(w=>WEAPONS[w.type].name+' Lv.'+w.level).join(', ')}</div>
    `;
    document.getElementById('game-over').style.display = 'block';
  }

  // HUD
  document.getElementById('hp-fill').style.width = Math.max(0, player.hp/player.maxHp*100)+'%';
  document.getElementById('hp-text').textContent = Math.ceil(player.hp)+'/'+player.maxHp;
  document.getElementById('xp-fill').style.width = (player.xp/player.xpNeeded*100)+'%';
  document.getElementById('level-text').textContent = 'Lv.'+player.level;
  document.getElementById('kill-text').textContent = kills+' kills';
  const secs = Math.floor(gameTime/1000);
  document.getElementById('timer').textContent = Math.floor(secs/60)+':'+((secs%60).toString().padStart(2,'0'));

  render();
  requestAnimationFrame(update);
}

function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-over').style.display = 'none';
  document.getElementById('level-up').style.display = 'none';
  initGame();
  lastTime = 0;
  requestAnimationFrame(update);
}
</script>
</body>
