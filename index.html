<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>桜幻の試練 — Sakura Survivors</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;overflow:hidden;touch-action:none;font-family:'Zen Maru Gothic',sans-serif}
canvas{display:block}
#ui{position:absolute;top:0;left:0;width:100%;pointer-events:none;color:#fff}
#xp-bar{width:100%;height:5px;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px)}
#xp-fill{height:100%;background:linear-gradient(90deg,#b48aff,#ff8abf);transition:width .3s;box-shadow:0 0 8px #b48aff}
#hud{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;font-size:13px;background:linear-gradient(180deg,rgba(10,10,30,0.6),transparent)}
#hp-wrap{display:flex;align-items:center;gap:8px}
#hp-bar{width:160px;height:10px;background:rgba(255,255,255,0.1);border-radius:5px;overflow:hidden;border:1px solid rgba(255,100,130,0.3)}
#hp-fill{height:100%;background:linear-gradient(90deg,#ff6b8a,#ffb86b);transition:width .2s;border-radius:5px;box-shadow:0 0 6px rgba(255,107,138,0.5)}
#timer{font-size:18px;color:#ffd700;text-shadow:0 0 10px rgba(255,215,0,0.5);letter-spacing:2px}
#stats{text-align:right;opacity:0.9}
#level-up{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(10,5,25,0.9);backdrop-filter:blur(8px);pointer-events:all;z-index:10}
#level-up-inner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;width:90%;max-width:600px}
#level-up h2{font-size:28px;color:#ffd700;margin-bottom:24px;text-shadow:0 0 20px rgba(255,215,0,0.6);letter-spacing:4px}
.choice{display:inline-block;width:170px;margin:8px;padding:18px 14px;background:linear-gradient(135deg,rgba(180,138,255,0.15),rgba(255,138,191,0.1));border:1px solid rgba(180,138,255,0.4);border-radius:16px;cursor:pointer;transition:all .3s;vertical-align:top;backdrop-filter:blur(4px)}
.choice:hover{background:linear-gradient(135deg,rgba(180,138,255,0.35),rgba(255,138,191,0.25));transform:translateY(-4px);border-color:#ffd700;box-shadow:0 8px 24px rgba(180,138,255,0.3)}
.choice .icon{font-size:28px;margin-bottom:8px}
.choice h3{font-size:15px;color:#e8c4ff;margin-bottom:6px}
.choice p{font-size:11px;color:rgba(255,255,255,0.6);line-height:1.4}
#game-over,#start-screen{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(10,5,25,0.95);backdrop-filter:blur(12px);pointer-events:all;z-index:20}
#start-screen{display:flex}
#game-over-inner,#start-inner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
#start-inner h1{font-size:42px;background:linear-gradient(135deg,#ffb8d0,#b48aff,#8ab4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;letter-spacing:3px}
#start-inner .sub{font-size:14px;color:rgba(255,255,255,0.4);margin-bottom:24px}
#start-inner .hint{font-size:12px;color:rgba(255,255,255,0.3);margin-bottom:20px}
.btn{padding:14px 36px;font-size:16px;background:linear-gradient(135deg,#b48aff,#ff8abf);border:none;color:#fff;border-radius:24px;cursor:pointer;font-family:inherit;pointer-events:all;letter-spacing:2px;box-shadow:0 4px 20px rgba(180,138,255,0.4);transition:all .3s}
.btn:hover{transform:scale(1.05);box-shadow:0 6px 30px rgba(180,138,255,0.6)}
#game-over-inner h2{font-size:32px;color:#ff6b8a;margin-bottom:20px;text-shadow:0 0 20px rgba(255,107,138,0.4)}
.stat{font-size:15px;margin:6px 0;color:rgba(255,255,255,0.7)}
.stat b{color:#ffd700}
#combo{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-80px);font-size:36px;color:#ffd700;text-shadow:0 0 20px rgba(255,215,0,0.6);pointer-events:none;z-index:5;transition:opacity .3s}
#joystick{display:none;position:fixed;bottom:50px;left:50px;width:110px;height:110px;border-radius:50%;background:rgba(180,138,255,0.1);border:1.5px solid rgba(180,138,255,0.25);z-index:5;pointer-events:all}
#joystick-knob{position:absolute;top:50%;left:50%;width:36px;height:36px;margin:-18px;border-radius:50%;background:rgba(255,138,191,0.4);box-shadow:0 0 10px rgba(255,138,191,0.3)}
#wave-announce{display:none;position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);font-size:24px;color:#ff6b8a;text-shadow:0 0 30px rgba(255,107,138,0.6);pointer-events:none;z-index:6;letter-spacing:3px}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
<div id="xp-bar"><div id="xp-fill" style="width:0%"></div></div>
<div id="hud">
<div id="hp-wrap"><div id="hp-bar"><div id="hp-fill" style="width:100%"></div></div><span id="hp-text" style="font-size:11px;opacity:0.7">100</span></div>
<div id="timer">00:00</div>
<div id="stats"><span id="level-text">Lv.1</span> · <span id="kill-text">0</span></div>
</div>
</div>
<div id="combo"></div>
<div id="wave-announce"></div>
<div id="level-up"><div id="level-up-inner"><h2>✦ レベルアップ ✦</h2><div id="choices"></div></div></div>
<div id="game-over"><div id="game-over-inner"><h2>✦ 試練終了 ✦</h2><div id="go-stats"></div><br><button class="btn" onclick="startGame()">もう一度</button></div></div>
<div id="start-screen"><div id="start-inner"><h1>桜幻の試練</h1><div class="sub">Sakura Survivors</div><div class="hint">WASD / 方向鍵移動 · 武器自動攻擊</div><button class="btn" onclick="startGame()">始める</button></div></div>
<div id="joystick"><div id="joystick-knob"></div></div>

<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
addEventListener('resize',resize);resize();

// Audio
const AC=new(window.AudioContext||window.webkitAudioContext)();
function snd(f,d,t='sine',v=.08){const o=AC.createOscillator(),g=AC.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+d)}
function sfxHit(){snd(300+Math.random()*200,.08,'triangle',.04)}
function sfxKill(){snd(800,.12,'sine',.06);setTimeout(()=>snd(1200,.08,'sine',.04),50)}
function sfxLvl(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>snd(f,.2,'sine',.08),i*80))}
function sfxBoss(){snd(60,.6,'sawtooth',.12);snd(90,.4,'square',.06)}
function sfxGem(){snd(1200+Math.random()*400,.04,'sine',.03)}

// State
let player,enemies,projectiles,particles,gems,weapons,petals,gameTime,kills,paused,gameOver,shakeTimer,slowTimer,camera,comboCount,comboTimer,waveNum;

const WEAPS={
  sakura:{name:'桜花刃',desc:'回転する桜の刃',icon:'🌸',color:'#ffb8d0',dmg:18,cd:0,count:3,speed:3,range:100},
  arrow:{name:'光矢',desc:'最も近い敵に矢を放つ',icon:'✨',color:'#ffd700',dmg:22,cd:700,count:1,speed:9,range:350},
  barrier:{name:'結界',desc:'身を守る霊力の壁',icon:'🔮',color:'#b48aff',dmg:12,cd:0,count:2,speed:2,range:65},
  thunder:{name:'雷撃',desc:'稲妻で敵を打つ',icon:'⚡',color:'#8ab4ff',dmg:35,cd:1800,count:1,speed:0,range:220},
  nova:{name:'衝撃波',desc:'全方位の衝撃を放つ',icon:'💫',color:'#ff8abf',dmg:28,cd:2800,count:1,speed:0,range:160},
  flame:{name:'獄炎',desc:'灼熱の炎が地面を焼く',icon:'🔥',color:'#ff4020',dmg:15,cd:1500,count:1,speed:0,range:130},
  frost:{name:'氷結陣',desc:'周囲の敵を凍結減速',icon:'❄️',color:'#80ffff',dmg:20,cd:2200,count:1,speed:0,range:180},
  dragon:{name:'龍神召喚',desc:'龍が螺旋状に飛ぶ',icon:'🐉',color:'#50ff80',dmg:40,cd:3500,count:1,speed:5,range:250},
  meteor:{name:'流星群',desc:'空から流星が降り注ぐ',icon:'☄️',color:'#ffaa30',dmg:50,cd:4000,count:3,speed:0,range:300},
};
// Stage system
const STAGES=[
  {name:'桜の森',bg1:'#0a0a1a',bg2:'#121225',bg3:'#1a1028',grid:'rgba(180,138,255,0.04)',enemies:[0],bossType:3,dur:60000},
  {name:'闇の洞窟',bg1:'#0a1010',bg2:'#0a1818',bg3:'#0a2020',grid:'rgba(80,255,200,0.04)',enemies:[0,1],bossType:4,dur:60000},
  {name:'魔界の門',bg1:'#1a0a10',bg2:'#200a15',bg3:'#2a0a1a',grid:'rgba(255,100,150,0.04)',enemies:[1,2],bossType:5,dur:60000},
  {name:'天空の塔',bg1:'#0a0a20',bg2:'#101035',bg3:'#181850',grid:'rgba(100,150,255,0.04)',enemies:[0,1,2],bossType:6,dur:90000},
  {name:'終焉の地',bg1:'#150505',bg2:'#200808',bg3:'#2a0a0a',grid:'rgba(255,80,80,0.04)',enemies:[1,2],bossType:7,dur:999999},
];
let currentStage=0,stageTimer=0,screenFlash=0;

function init(){
  player={x:0,y:0,hp:100,maxHp:100,speed:3,xp:0,level:1,xpNeeded:10,invT:0,dir:1};
  enemies=[];projectiles=[];particles=[];gems=[];petals=[];
  weapons=[{type:'sakura',level:1,timer:0,angle:0}];
  gameTime=0;kills=0;paused=false;gameOver=false;shakeTimer=0;slowTimer=0;
  camera={x:0,y:0};comboCount=0;comboTimer=0;waveNum=0;
  currentStage=0;stageTimer=0;screenFlash=0;
  for(let i=0;i<30;i++) petals.push(mkPetal());
}

function mkPetal(){return{x:player.x+(Math.random()-0.5)*W*2,y:player.y+(Math.random()-0.5)*H*2,vx:-0.3-Math.random()*0.5,vy:0.5+Math.random()*0.8,rot:Math.random()*6.28,rotS:(Math.random()-0.5)*0.03,size:2+Math.random()*3,alpha:0.2+Math.random()*0.4,color:['#ffcce0','#ffd0d0','#ffe0f0','#fff0f8'][Math.floor(Math.random()*4)]}}

// Input
const keys={};let joyX=0,joyY=0;
addEventListener('keydown',e=>{keys[e.key]=true;if(AC.state==='suspended')AC.resume()});
addEventListener('keyup',e=>keys[e.key]=false);
const isMobile='ontouchstart'in window;
if(isMobile){
  document.getElementById('joystick').style.display='block';
  const j=document.getElementById('joystick'),k=document.getElementById('joystick-knob');
  let ja=false,jsx,jsy;
  j.addEventListener('touchstart',e=>{e.preventDefault();ja=true;jsx=e.touches[0].clientX;jsy=e.touches[0].clientY;if(AC.state==='suspended')AC.resume()});
  addEventListener('touchmove',e=>{if(!ja)return;let dx=e.touches[0].clientX-jsx,dy=e.touches[0].clientY-jsy;const d=Math.hypot(dx,dy);if(d>45){dx=dx/d*45;dy=dy/d*45}k.style.transform=`translate(${dx}px,${dy}px)`;joyX=dx/45;joyY=dy/45});
  addEventListener('touchend',()=>{ja=false;joyX=joyY=0;k.style.transform=''});
}
function getInput(){let dx=0,dy=0;if(keys.w||keys.ArrowUp)dy=-1;if(keys.s||keys.ArrowDown)dy=1;if(keys.a||keys.ArrowLeft)dx=-1;if(keys.d||keys.ArrowRight)dx=1;if(joyX||joyY){dx=joyX;dy=joyY}const l=Math.hypot(dx,dy);if(l>0){dx/=l;dy/=l}return{dx,dy}}

// Enemies
function spawnEnemy(){
  const a=Math.random()*Math.PI*2,dist=Math.max(W,H)*.6+Math.random()*100;
  const mins=gameTime/60000,hm=1+mins*.4+currentStage*.3,dm=1+mins*.15+currentStage*.2;
  const stage=STAGES[currentStage]||STAGES[STAGES.length-1];
  const types=[
    {hp:20,speed:1.6,dmg:5,size:10,xp:1,type:0,name:'スライム'},
    {hp:45,speed:1.2,dmg:10,size:13,xp:2,type:1,name:'ゴブリン'},
    {hp:75,speed:.9,dmg:15,size:16,xp:3,type:2,name:'デーモン'},
  ];
  const pool=stage.enemies;
  const ti=pool[Math.floor(Math.random()*pool.length)];
  const t=types[ti];
  enemies.push({x:player.x+Math.cos(a)*dist,y:player.y+Math.sin(a)*dist,hp:t.hp*hm,maxHp:t.hp*hm,speed:t.speed+mins*.015,dmg:t.dmg*dm,size:t.size,boss:false,xp:t.xp,type:t.type,flash:0});
}

function spawnBoss(){
  const a=Math.random()*Math.PI*2,dist=Math.max(W,H)*.5;
  const mins=gameTime/60000,hm=1+mins*.4+currentStage*.5;
  const stage=STAGES[currentStage]||STAGES[STAGES.length-1];
  const bossTypes=[
    {name:'桜鬼',hp:500,dmg:20,size:30,speed:1.0,type:3},
    {name:'氷龍',hp:700,dmg:25,size:32,speed:1.1,type:4},
    {name:'炎魔王',hp:900,dmg:30,size:35,speed:0.9,type:5},
    {name:'天空神',hp:1200,dmg:35,size:38,speed:1.2,type:6},
    {name:'終焉の主',hp:2000,dmg:40,size:42,speed:1.0,type:7},
  ];
  const bt=bossTypes[Math.min(currentStage, bossTypes.length-1)];
  sfxBoss();showWave(`⚠ BOSS: ${bt.name} ⚠`);screenFlash=300;
  enemies.push({x:player.x+Math.cos(a)*dist,y:player.y+Math.sin(a)*dist,hp:bt.hp*hm,maxHp:bt.hp*hm,speed:bt.speed,dmg:bt.dmg,size:bt.size,boss:true,xp:80+currentStage*30,type:bt.type,flash:0,bossName:bt.name});
}

// Boss reward
function bossReward(){
  paused=true;screenFlash=200;
  snd(523,.3,'sine',.1);setTimeout(()=>snd(784,.3,'sine',.1),150);setTimeout(()=>snd(1047,.4,'sine',.1),300);
  document.getElementById('level-up').style.display='block';
  const ch=document.getElementById('choices');ch.innerHTML='';
  document.querySelector('#level-up h2').textContent='✦ ボス撃破報酬 ✦';
  const rewards=[
    {name:'全回復',desc:'HPを全回復する',icon:'💖',fn:()=>{player.hp=player.maxHp}},
    {name:'武器強化+2',desc:'ランダムな武器を2レベルアップ',icon:'⚔️',fn:()=>{const ws=weapons.filter(w=>w.level<8);for(let i=0;i<Math.min(2,ws.length);i++)ws[i].level+=2}},
    {name:'最大HP+50',desc:'最大HPを大幅増加',icon:'🛡️',fn:()=>{player.maxHp+=50;player.hp+=50}},
    {name:'俊足+1',desc:'移動速度を大幅増加',icon:'💨',fn:()=>{player.speed+=1}},
    {name:'新武器ガチャ',desc:'ランダムな新武器を獲得',icon:'🎰',fn:()=>{const avail=Object.keys(WEAPS).filter(k=>!weapons.find(w=>w.type===k));if(avail.length)weapons.push({type:avail[Math.floor(Math.random()*avail.length)],level:1,timer:0,angle:0})}},
  ];
  const picks=[];while(picks.length<3&&rewards.length>0){const i=Math.floor(Math.random()*rewards.length);picks.push(rewards.splice(i,1)[0])}
  picks.forEach(r=>{
    const d=document.createElement('div');d.className='choice';
    d.innerHTML=`<div class="icon">${r.icon}</div><h3>${r.name}</h3><p>${r.desc}</p>`;
    d.onclick=()=>{r.fn();document.getElementById('level-up').style.display='none';document.querySelector('#level-up h2').textContent='✦ レベルアップ ✦';paused=false};
    ch.appendChild(d);
  });
}

function showWave(text){
  const el=document.getElementById('wave-announce');
  el.textContent=text;el.style.display='block';el.style.opacity='1';
  setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.style.display='none',500)},2000);
}

// Damage
function dmgEnemy(e,d){
  e.hp-=d;e.flash=80;sfxHit();
  particles.push({x:e.x,y:e.y-e.size,vx:(Math.random()-.5)*1.5,vy:-2.5,life:700,text:Math.ceil(d)+'',color:'#ffd700',size:14,type:'text'});
  if(e.hp<=0&&!e.dead){
    e.dead=true;kills++;comboCount++;comboTimer=1500;
    sfxKill();
    if(comboCount>=5){snd(1500,.1,'sine',.05)}
    // Death particles — beautiful burst
    const colors=['#ffb8d0','#b48aff','#ffd700','#8ab4ff','#ff8abf'];
    for(let i=0;i<(e.boss?30:12);i++){
      const ang=Math.random()*6.28,spd=1+Math.random()*(e.boss?6:4);
      particles.push({x:e.x,y:e.y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:400+Math.random()*400,color:colors[Math.floor(Math.random()*5)],size:1.5+Math.random()*2.5,type:'spark'});
    }
    // Ring effect
    particles.push({x:e.x,y:e.y,vx:0,vy:0,life:300,color:'#fff',size:0,type:'ring',maxR:e.boss?80:40});
    gems.push({x:e.x,y:e.y,xp:e.xp,size:e.boss?8:4,life:12000,pulse:0});
    shakeTimer=e.boss?500:80;screenFlash=e.boss?400:40;
    if(e.boss){slowTimer=500;setTimeout(()=>bossReward(),600)}
  }
}

// Weapons
function updateWeapons(dt){
  weapons.forEach(w=>{
    const def=WEAPS[w.type];
    w.timer+=dt;
    const d=def.dmg*(1+(w.level-1)*.3);
    const cnt=def.count+Math.floor((w.level-1)/2);
    const rng=def.range*(1+(w.level-1)*.15);

    if(w.type==='sakura'){
      w.angle+=def.speed*dt/1000;
      w._pos=Array.from({length:cnt},(_,i)=>{const a=w.angle+(Math.PI*2/cnt)*i;return{x:player.x+Math.cos(a)*rng,y:player.y+Math.sin(a)*rng,a}});
      w._pos.forEach(p=>{enemies.forEach(e=>{if(e.dead)return;if(Math.hypot(e.x-p.x,e.y-p.y)<e.size+10)dmgEnemy(e,d*dt/1000*3)})});
    }
    if(w.type==='barrier'){
      w.angle+=def.speed*dt/1000;
      w._pos=Array.from({length:cnt},(_,i)=>{const a=w.angle+(Math.PI*2/cnt)*i;return{x:player.x+Math.cos(a)*rng,y:player.y+Math.sin(a)*rng}});
      w._pos.forEach(p=>{enemies.forEach(e=>{if(e.dead)return;if(Math.hypot(e.x-p.x,e.y-p.y)<e.size+14)dmgEnemy(e,d*dt/1000*2)})});
    }
    if(w.type==='arrow'&&w.timer>=def.cd/(1+(w.level-1)*.2)){
      w.timer=0;let near=null,nd=1e9;
      enemies.forEach(e=>{if(e.dead)return;const dd=Math.hypot(e.x-player.x,e.y-player.y);if(dd<nd){nd=dd;near=e}});
      if(near&&nd<rng*2){
        const a=Math.atan2(near.y-player.y,near.x-player.x);
        for(let i=0;i<cnt;i++){const sp=(i-(cnt-1)/2)*.12;
          projectiles.push({x:player.x,y:player.y,vx:Math.cos(a+sp)*def.speed,vy:Math.sin(a+sp)*def.speed,dmg:d,life:800,color:def.color,size:3,trail:[]});
        }snd(600,.04,'triangle',.03);
      }
    }
    if(w.type==='thunder'&&w.timer>=def.cd/(1+(w.level-1)*.2)){
      w.timer=0;
      const tgts=enemies.filter(e=>!e.dead&&Math.hypot(e.x-player.x,e.y-player.y)<rng).slice(0,cnt+w.level);
      tgts.forEach(e=>{
        dmgEnemy(e,d);
        // Lightning bolt particles
        const steps=8;
        for(let i=0;i<steps;i++){
          const t=i/steps;
          const lx=player.x+(e.x-player.x)*t+(Math.random()-.5)*20;
          const ly=player.y+(e.y-player.y)*t+(Math.random()-.5)*20;
          particles.push({x:lx,y:ly,vx:0,vy:0,life:200,color:'#8ab4ff',size:2+Math.random()*2,type:'spark'});
        }
        snd(900+Math.random()*400,.06,'sawtooth',.03);
      });
    }
    if(w.type==='nova'&&w.timer>=def.cd/(1+(w.level-1)*.2)){
      w.timer=0;screenFlash=80;
      enemies.forEach(e=>{if(e.dead)return;const dd=Math.hypot(e.x-player.x,e.y-player.y);if(dd<rng)dmgEnemy(e,d*(1-dd/rng))});
      w._wave={r:0,maxR:rng,life:400};snd(200,.25,'sine',.08);snd(100,.3,'square',.05);
      for(let i=0;i<40;i++){const a=Math.PI*2*i/40,sp=2+Math.random()*4;particles.push({x:player.x,y:player.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:500,color:['#ff8abf','#ffb8d0','#fff','#ffd700'][Math.floor(Math.random()*4)],size:2+Math.random()*3,type:'spark'})}
    }
    // Flame — ground fire
    if(w.type==='flame'&&w.timer>=def.cd/(1+(w.level-1)*.2)){
      w.timer=0;snd(150,.3,'sawtooth',.06);
      const fc=cnt+w.level;
      for(let i=0;i<fc;i++){
        const fx=player.x+(Math.random()-.5)*rng*2,fy=player.y+(Math.random()-.5)*rng*2;
        enemies.forEach(e=>{if(e.dead)return;if(Math.hypot(e.x-fx,e.y-fy)<40)dmgEnemy(e,d)});
        for(let j=0;j<15;j++)particles.push({x:fx,y:fy,vx:(Math.random()-.5)*3,vy:-2-Math.random()*4,life:400+Math.random()*300,color:['#ff4020','#ff8020','#ffcc00','#fff'][Math.floor(Math.random()*4)],size:2+Math.random()*4,type:'spark'});
      }
    }
    // Frost — AoE slow + damage
    if(w.type==='frost'&&w.timer>=def.cd/(1+(w.level-1)*.2)){
      w.timer=0;snd(1200,.2,'sine',.05);snd(800,.3,'triangle',.04);
      w._frost={r:0,maxR:rng,life:500};
      enemies.forEach(e=>{if(e.dead)return;const dd=Math.hypot(e.x-player.x,e.y-player.y);if(dd<rng){dmgEnemy(e,d);e.speed*=.4;setTimeout(()=>{if(!e.dead)e.speed/=.4},3000)}});
      for(let i=0;i<30;i++){const a=Math.random()*6.28,sp=1+Math.random()*3;particles.push({x:player.x+Math.cos(a)*Math.random()*rng,y:player.y+Math.sin(a)*Math.random()*rng,vx:0,vy:-1-Math.random(),life:600,color:['#80ffff','#b0ffff','#ffffff','#80c0ff'][Math.floor(Math.random()*4)],size:2+Math.random()*3,type:'spark'})}
    }
    if(w._frost){w._frost.r+=rng/500*dt;w._frost.life-=dt;if(w._frost.life<=0)w._frost=null}
    // Dragon — spiral projectile
    if(w.type==='dragon'&&w.timer>=def.cd/(1+(w.level-1)*.2)){
      w.timer=0;snd(300,.4,'sawtooth',.08);snd(500,.3,'sine',.05);screenFlash=60;
      const da=(w._dAngle||0);w._dAngle=(da+1)%6.28;
      for(let i=0;i<cnt+w.level;i++){
        const ang=da+i*(6.28/(cnt+w.level));
        projectiles.push({x:player.x,y:player.y,vx:Math.cos(ang)*def.speed,vy:Math.sin(ang)*def.speed,dmg:d,life:1200,color:def.color,size:5,trail:[],spiral:true,sa:ang,st:0});
      }
    }
    // Meteor — random area strikes
    if(w.type==='meteor'&&w.timer>=def.cd/(1+(w.level-1)*.2)){
      w.timer=0;
      const mc=cnt+Math.floor(w.level/2);
      for(let i=0;i<mc;i++){
        setTimeout(()=>{
          const mx=player.x+(Math.random()-.5)*rng*2,my=player.y+(Math.random()-.5)*rng*2;
          snd(100+Math.random()*100,.2,'square',.06);shakeTimer=Math.max(shakeTimer,150);
          enemies.forEach(e=>{if(e.dead)return;if(Math.hypot(e.x-mx,e.y-my)<50)dmgEnemy(e,d)});
          // Massive explosion
          for(let j=0;j<25;j++){const a=Math.random()*6.28,sp=2+Math.random()*5;particles.push({x:mx,y:my,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:500+Math.random()*300,color:['#ffaa30','#ff6020','#ffd700','#fff','#ff4010'][Math.floor(Math.random()*5)],size:2+Math.random()*4,type:'spark'})}
          particles.push({x:mx,y:my,vx:0,vy:0,life:400,color:'#ffaa30',size:0,type:'ring',maxR:60});
          // Impact line from sky
          for(let j=0;j<8;j++)particles.push({x:mx+(Math.random()-.5)*10,y:my-100-Math.random()*200,vx:0,vy:8+Math.random()*4,life:200,color:'#ffcc00',size:2,type:'spark'});
        },i*200);
      }
    }
    if(w._wave){w._wave.r+=rng/400*dt;w._wave.life-=dt;if(w._wave.life<=0)w._wave=null}
  });
}

// Level up
function levelUp(){
  paused=true;sfxLvl();
  document.getElementById('level-up').style.display='block';
  const ch=document.getElementById('choices');ch.innerHTML='';
  const opts=[];
  weapons.forEach(w=>{if(w.level<8)opts.push({t:'up',w:w.type,name:WEAPS[w.type].name+' ↑',desc:`Lv.${w.level}→${w.level+1}`,icon:WEAPS[w.type].icon})});
  Object.keys(WEAPS).forEach(k=>{if(!weapons.find(w=>w.type===k))opts.push({t:'new',w:k,name:WEAPS[k].name,desc:WEAPS[k].desc,icon:WEAPS[k].icon})});
  opts.push({t:'stat',s:'maxHp',name:'生命力+25',desc:'最大HPを増加',icon:'❤️'});
  opts.push({t:'stat',s:'speed',name:'俊足+0.3',desc:'移動速度を増加',icon:'💨'});
  const picks=[];while(picks.length<3&&opts.length>0){const i=Math.floor(Math.random()*opts.length);picks.push(opts.splice(i,1)[0])}
  picks.forEach(o=>{
    const d=document.createElement('div');d.className='choice';
    d.innerHTML=`<div class="icon">${o.icon}</div><h3>${o.name}</h3><p>${o.desc}</p>`;
    d.onclick=()=>{
      if(o.t==='up')weapons.find(w=>w.type===o.w).level++;
      else if(o.t==='new')weapons.push({type:o.w,level:1,timer:0,angle:0});
      else if(o.t==='stat'){if(o.s==='maxHp'){player.maxHp+=25;player.hp=Math.min(player.hp+25,player.maxHp)}if(o.s==='speed')player.speed+=.3}
      document.getElementById('level-up').style.display='none';paused=false;
    };ch.appendChild(d);
  });
}

// Render helpers
function toS(wx,wy){return{x:wx-camera.x,y:wy-camera.y}}

function drawGlow(x,y,r,color,a=.2){
  const g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,color+(Math.floor(a*255).toString(16).padStart(2,'0')));
  g.addColorStop(1,color+'00');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,6.28);ctx.fill();
}

// Draw background — gradient + grid
function drawBg(){
  const st=STAGES[currentStage]||STAGES[0];
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,st.bg1);g.addColorStop(.5,st.bg2);g.addColorStop(1,st.bg3);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  const gs=80,ox=-camera.x%gs,oy=-camera.y%gs;
  ctx.strokeStyle=st.grid;ctx.lineWidth=1;
  for(let x=ox;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=oy;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
}

// Draw cherry blossom petal
function drawPetal(p){
  const s=toS(p.x,p.y);
  if(s.x<-20||s.x>W+20||s.y<-20||s.y>H+20)return;
  ctx.save();ctx.translate(s.x,s.y);ctx.rotate(p.rot);ctx.globalAlpha=p.alpha;
  ctx.fillStyle=p.color;
  ctx.beginPath();ctx.moveTo(0,-p.size);ctx.quadraticCurveTo(p.size*.8,0,0,p.size);ctx.quadraticCurveTo(-p.size*.8,0,0,-p.size);ctx.fill();
  ctx.globalAlpha=1;ctx.restore();
}

// Draw enemy with beautiful style
function drawEnemy(e){
  if(e.dead)return;
  const s=toS(e.x,e.y);
  if(s.x<-50||s.x>W+50||s.y<-50||s.y>H+50)return;
  const colors=[['#7fdfb0','#4fb878'],['#ffa040','#e07020'],['#d060d0','#9030a0'],['#ff4060','#c02040']];
  const c=colors[e.type]||colors[0];
  // Glow
  drawGlow(s.x,s.y,e.size*2,c[0],.1);
  // Flash white on hit
  const fc=e.flash>0?'#fff':c[0];
  // Body
  ctx.fillStyle=fc;
  if(e.boss){
    // Boss — ornate shape
    ctx.beginPath();
    for(let i=0;i<8;i++){const a=Math.PI/4*i-Math.PI/8,r=i%2?e.size*.7:e.size;ctx.lineTo(s.x+Math.cos(a)*r,s.y+Math.sin(a)*r)}
    ctx.closePath();ctx.fill();
    ctx.fillStyle=c[1];ctx.beginPath();ctx.arc(s.x,s.y,e.size*.4,0,6.28);ctx.fill();
    // Eyes
    ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(s.x-6,s.y-4,3,0,6.28);ctx.arc(s.x+6,s.y-4,3,0,6.28);ctx.fill();
    // HP bar
    const bw=50;
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(s.x-bw/2,s.y-e.size-14,bw,4);
    ctx.fillStyle='#ff4060';ctx.fillRect(s.x-bw/2,s.y-e.size-14,bw*(e.hp/e.maxHp),4);
  }else{
    ctx.beginPath();ctx.arc(s.x,s.y,e.size,0,6.28);ctx.fill();
    ctx.fillStyle=c[1];ctx.beginPath();ctx.arc(s.x,s.y,e.size*.5,0,6.28);ctx.fill();
    // Eyes
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(s.x-e.size*.25,s.y-e.size*.15,2,0,6.28);ctx.arc(s.x+e.size*.25,s.y-e.size*.15,2,0,6.28);ctx.fill();
  }
}

// Draw player — beautiful anime-style silhouette
function drawPlayer(){
  const s=toS(player.x,player.y);
  if(player.invT>0&&Math.floor(player.invT/60)%2)return;
  // Outer glow
  drawGlow(s.x,s.y,40,'#b48aff',.12);
  drawGlow(s.x,s.y,20,'#ffb8d0',.15);
  // Body
  ctx.fillStyle='#e8c4ff';
  ctx.beginPath();ctx.arc(s.x,s.y,11,0,6.28);ctx.fill();
  // Inner light
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(s.x,s.y-1,5,0,6.28);ctx.fill();
  // Hair accent
  ctx.fillStyle='#8060c0';
  ctx.beginPath();ctx.arc(s.x,s.y-8,7,Math.PI+.3,Math.PI*2-.3);ctx.fill();
  // Eyes
  ctx.fillStyle='#4030a0';
  ctx.fillRect(s.x-4,s.y-2,2,2);ctx.fillRect(s.x+2,s.y-2,2,2);
  // Sparkle trail
  if(Math.random()<.3){
    particles.push({x:player.x+(Math.random()-.5)*10,y:player.y+8,vx:(Math.random()-.5)*.5,vy:.5,life:300,color:'#b48aff',size:1+Math.random(),type:'spark'});
  }
}

// Render
function render(){
  drawBg();
  let sx=0,sy=0;
  if(shakeTimer>0){sx=(Math.random()-.5)*shakeTimer/15;sy=(Math.random()-.5)*shakeTimer/15}
  ctx.save();ctx.translate(sx,sy);

  // Petals (background)
  petals.forEach(drawPetal);

  // Gems
  gems.forEach(g=>{
    const s=toS(g.x,g.y);
    g.pulse=(g.pulse||0)+.05;
    const sz=g.size+Math.sin(g.pulse)*1.5;
    drawGlow(s.x,s.y,sz*3,'#b48aff',.15);
    // Diamond shape
    ctx.fillStyle='#d0a0ff';
    ctx.beginPath();ctx.moveTo(s.x,s.y-sz);ctx.lineTo(s.x+sz*.7,s.y);ctx.lineTo(s.x,s.y+sz);ctx.lineTo(s.x-sz*.7,s.y);ctx.closePath();ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.moveTo(s.x,s.y-sz*.5);ctx.lineTo(s.x+sz*.3,s.y);ctx.lineTo(s.x,s.y+sz*.3);ctx.closePath();ctx.fill();
  });

  // Enemies
  enemies.forEach(drawEnemy);

  // Weapon visuals
  weapons.forEach(w=>{
    const def=WEAPS[w.type];
    if((w.type==='sakura')&&w._pos){
      w._pos.forEach(p=>{
        const s=toS(p.x,p.y);
        ctx.save();ctx.translate(s.x,s.y);ctx.rotate(p.a*3);
        // Sakura blade — petal shape
        ctx.fillStyle='#ffb8d0';ctx.globalAlpha=.9;
        ctx.beginPath();ctx.moveTo(0,-8);ctx.quadraticCurveTo(6,0,0,8);ctx.quadraticCurveTo(-6,0,0,-8);ctx.fill();
        ctx.fillStyle='#fff';ctx.globalAlpha=.6;
        ctx.beginPath();ctx.moveTo(0,-4);ctx.quadraticCurveTo(2,0,0,4);ctx.quadraticCurveTo(-2,0,0,-4);ctx.fill();
        ctx.globalAlpha=1;ctx.restore();
        // Trail
        if(Math.random()<.4)particles.push({x:p.x,y:p.y,vx:(Math.random()-.5),vy:(Math.random()-.5),life:200,color:'#ffcce0',size:1.5,type:'spark'});
      });
    }
    if(w.type==='barrier'&&w._pos){
      w._pos.forEach(p=>{
        const s=toS(p.x,p.y);
        drawGlow(s.x,s.y,18,'#b48aff',.2);
        ctx.strokeStyle='#b48aff';ctx.lineWidth=2;ctx.globalAlpha=.7;
        ctx.beginPath();ctx.arc(s.x,s.y,10,0,6.28);ctx.stroke();
        ctx.globalAlpha=1;
      });
    }
    if(w._wave){
      const s=toS(player.x,player.y);
      ctx.globalAlpha=w._wave.life/400*.6;
      ctx.strokeStyle='#ff8abf';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(s.x,s.y,w._wave.r,0,6.28);ctx.stroke();
      ctx.strokeStyle='#fff';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(s.x,s.y,w._wave.r*.8,0,6.28);ctx.stroke();
      ctx.globalAlpha=1;
    }
  });

  // Projectiles with trails
  projectiles.forEach(p=>{
    const s=toS(p.x,p.y);
    // Trail
    p.trail=p.trail||[];p.trail.push({x:p.x,y:p.y});if(p.trail.length>6)p.trail.shift();
    p.trail.forEach((t,i)=>{
      const ts=toS(t.x,t.y);
      ctx.globalAlpha=(i/p.trail.length)*.3;
      ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(ts.x,ts.y,p.size*(i/p.trail.length),0,6.28);ctx.fill();
    });
    ctx.globalAlpha=1;
    drawGlow(s.x,s.y,p.size*3,p.color,.3);
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,p.size*.8,0,6.28);ctx.fill();
    ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(s.x,s.y,p.size,0,6.28);ctx.fill();
  });

  // Player
  drawPlayer();

  // Particles
  particles.forEach(p=>{
    const s=toS(p.x,p.y);
    const al=Math.max(0,p.life/(p.type==='ring'?300:600));
    ctx.globalAlpha=al;
    if(p.type==='text'){
      ctx.font=`bold ${p.size}px 'Zen Maru Gothic',sans-serif`;
      ctx.fillStyle=p.color;ctx.fillText(p.text,s.x-10,s.y);
    }else if(p.type==='ring'){
      const r=(1-p.life/300)*(p.maxR||40);
      ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.beginPath();ctx.arc(s.x,s.y,r,0,6.28);ctx.stroke();
    }else{
      ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(s.x,s.y,p.size*al,0,6.28);ctx.fill();
    }
    ctx.globalAlpha=1;
  });

  ctx.restore();

  // Frost ring visual
  weapons.forEach(w=>{if(w._frost){
    const s=toS(player.x,player.y);
    ctx.globalAlpha=w._frost.life/500*.4;
    ctx.strokeStyle='#80ffff';ctx.lineWidth=3;ctx.beginPath();ctx.arc(s.x,s.y,w._frost.r,0,6.28);ctx.stroke();
    ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.beginPath();ctx.arc(s.x,s.y,w._frost.r*.9,0,6.28);ctx.stroke();
    ctx.globalAlpha=1;
  }});

  // Vignette
  const vg=ctx.createRadialGradient(W/2,H/2,W*.3,W/2,H/2,W*.7);
  vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(10,5,20,0.4)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

  // Screen flash
  if(screenFlash>0){
    ctx.globalAlpha=Math.min(.4,screenFlash/300);
    ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=1;
  }

  // Stage name indicator
  const st=STAGES[currentStage]||STAGES[0];
  ctx.globalAlpha=.3;ctx.fillStyle='#fff';ctx.font='12px "Zen Maru Gothic"';
  ctx.fillText(st.name,W-100,H-10);ctx.globalAlpha=1;
}

// Update
let lastT=0,spawnT=0;
function update(ts){
  if(!lastT)lastT=ts;
  let dt=Math.min(ts-lastT,50);
  lastT=ts;
  if(gameOver||paused){requestAnimationFrame(update);return}

  // Slow motion
  if(slowTimer>0){slowTimer-=dt;dt*=.3}

  gameTime+=dt;shakeTimer=Math.max(0,shakeTimer-dt);

  // Stage system
  stageTimer+=dt;screenFlash=Math.max(0,screenFlash-dt);
  const stage=STAGES[currentStage]||STAGES[STAGES.length-1];
  if(stageTimer>=stage.dur&&currentStage<STAGES.length-1){
    // Boss at end of stage
    if(!enemies.find(e=>e.boss)){spawnBoss()}
    // Advance stage when boss is dead
    if(stageTimer>=stage.dur+2000&&!enemies.find(e=>e.boss)){
      currentStage++;stageTimer=0;
      const ns=STAGES[currentStage]||STAGES[STAGES.length-1];
      showWave(`✦ ${ns.name} ✦`);screenFlash=400;
      snd(400,.3,'sine',.1);snd(600,.3,'sine',.08);snd(800,.3,'sine',.06);
    }
  }
  // Wave announcements
  const newWave=Math.floor(gameTime/15000);
  if(newWave>waveNum){waveNum=newWave;showWave(`第${waveNum}波`)}

  // Combo
  comboTimer-=dt;if(comboTimer<=0)comboCount=0;
  const comboEl=document.getElementById('combo');
  if(comboCount>=3){comboEl.style.display='block';comboEl.textContent=`${comboCount} COMBO!`;comboEl.style.opacity=comboTimer>200?'1':'0'}else{comboEl.style.display='none'}

  // Input
  const inp=getInput();
  player.x+=inp.dx*player.speed;player.y+=inp.dy*player.speed;
  if(inp.dx)player.dir=inp.dx>0?1:-1;
  player.invT=Math.max(0,player.invT-dt);

  camera.x=player.x-W/2;camera.y=player.y-H/2;

  // Spawn
  const mins=gameTime/60000;
  const rate=Math.max(150,900-mins*80);
  spawnT+=dt;if(spawnT>rate){spawnT=0;spawnEnemy()}

  // Enemies
  enemies.forEach(e=>{
    if(e.dead)return;
    e.flash=Math.max(0,(e.flash||0)-dt);
    const dx=player.x-e.x,dy=player.y-e.y,d=Math.hypot(dx,dy);
    if(d>0){e.x+=dx/d*e.speed;e.y+=dy/d*e.speed}
    if(d<e.size+11&&player.invT<=0){
      player.hp-=e.dmg;player.invT=500;shakeTimer=120;
      snd(80,.2,'sawtooth',.08);
      for(let i=0;i<8;i++)particles.push({x:player.x,y:player.y,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:300,color:'#ff6b8a',size:2,type:'spark'});
    }
  });
  enemies=enemies.filter(e=>!e.dead);

  // Projectiles
  projectiles.forEach(p=>{
    if(p.spiral){p.st+=dt;const sp=.003;p.vx=Math.cos(p.sa+p.st*sp)*5;p.vy=Math.sin(p.sa+p.st*sp)*5}
    p.x+=p.vx;p.y+=p.vy;p.life-=dt;
    enemies.forEach(e=>{if(e.dead)return;if(Math.hypot(e.x-p.x,e.y-p.y)<e.size+p.size){dmgEnemy(e,p.dmg);if(!p.spiral)p.life=0;
      for(let i=0;i<5;i++)particles.push({x:p.x,y:p.y,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,life:200,color:p.color,size:2,type:'spark'})}});
  });
  projectiles=projectiles.filter(p=>p.life>0);

  // Gems
  gems.forEach(g=>{
    g.life-=dt;
    const d=Math.hypot(player.x-g.x,player.y-g.y);
    if(d<100){const dx=player.x-g.x,dy=player.y-g.y;g.x+=dx/d*6;g.y+=dy/d*6}
    if(d<18){player.xp+=g.xp;g.life=0;sfxGem()}
  });
  gems=gems.filter(g=>g.life>0);

  // Level up
  if(player.xp>=player.xpNeeded){player.xp-=player.xpNeeded;player.level++;player.xpNeeded=Math.floor(player.xpNeeded*1.4);levelUp()}

  // Weapons
  updateWeapons(dt);

  // Particles
  particles.forEach(p=>{p.x+=(p.vx||0);p.y+=(p.vy||0);p.life-=dt;if(p.vy!==undefined&&p.type==='text')p.vy+=.03});
  particles=particles.filter(p=>p.life>0);

  // Petals
  petals.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.rotS;
    if(p.x<player.x-W||p.x>player.x+W||p.y<player.y-H||p.y>player.y+H){
      p.x=player.x+(Math.random()-.5)*W*2;p.y=player.y-H/2-Math.random()*100;
    }
  });

  // Death
  if(player.hp<=0){
    gameOver=true;
    const s=Math.floor(gameTime/1000),m=Math.floor(s/60),sec=s%60;
    document.getElementById('go-stats').innerHTML=`
      <div class="stat">存活時間 <b>${m}:${sec.toString().padStart(2,'0')}</b></div>
      <div class="stat">討伐数 <b>${kills}</b></div>
      <div class="stat">到達レベル <b>${player.level}</b></div>
      <div class="stat">最大コンボ <b>${comboCount}</b></div>
      <div class="stat">${weapons.map(w=>WEAPS[w.type].icon+WEAPS[w.type].name+' Lv.'+w.level).join(' · ')}</div>`;
    document.getElementById('game-over').style.display='block';
  }

  // HUD
  document.getElementById('hp-fill').style.width=Math.max(0,player.hp/player.maxHp*100)+'%';
  document.getElementById('hp-text').textContent=Math.ceil(player.hp);
  document.getElementById('xp-fill').style.width=(player.xp/player.xpNeeded*100)+'%';
  document.getElementById('level-text').textContent='Lv.'+player.level;
  document.getElementById('kill-text').textContent=kills;
  const s2=Math.floor(gameTime/1000);
  document.getElementById('timer').textContent=Math.floor(s2/60)+':'+((s2%60).toString().padStart(2,'0'));

  render();
  requestAnimationFrame(update);
}

function startGame(){
  document.getElementById('start-screen').style.display='none';
  document.getElementById('game-over').style.display='none';
  document.getElementById('level-up').style.display='none';
  init();lastT=0;requestAnimationFrame(update);
}
</script>
</body>
